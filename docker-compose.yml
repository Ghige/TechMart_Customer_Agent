version: "3.9"

services:
  techmart:
    build: .
    container_name: techmart_agent
    ports:
      - "8000:8000"
    environment:
      # Set your real key in a .env file or export it in your shell
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - TECHMART_DB_PATH=/data/techmart.db
    volumes:
      # Persist SQLite database across restarts
      - techmart_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  techmart_data:
